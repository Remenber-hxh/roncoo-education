### \u5F00\u53D1\u73AF\u5883\uFF0C\u4E0D\u6CE8\u518C\u5230nacos\uFF0C\u65B9\u4FBF\u8C03\u8BD5
spring.cloud.service-registry.auto-registration.enabled=false
spring.cloud.discovery.client.simple.instances.service-system[0].uri=http://127.0.0.1:7710
spring.cloud.discovery.client.simple.instances.service-user[0].uri=http://127.0.0.1:7720
spring.cloud.discovery.client.simple.instances.service-course[0].uri=http://127.0.0.1:7730

### ===== 本地二开配置（原本在 Nacos，现落到本地 dev profile）=====
### 数据源 Druid + MySQL
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/roncoo_education?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=roncoo
spring.datasource.password=roncoo123456

### Redis
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
### Spring Cache 用 Redis（@Cacheable 的 system/user/course 缓存按需创建；原配置在 Nacos）
spring.cache.type=redis

### MyBatis
mybatis.mapper-locations=classpath*:mybatis/**/*.xml

### xxl-job（本地无 admin，填占位值以通过启动；executor 注册失败不影响服务启动）
xxl.job.admin.addresses=http://127.0.0.1:8080/xxl-job-admin
xxl.job.accessToken=default_token
xxl.job.executor.appname=roncoo-executor
xxl.job.executor.address=
xxl.job.executor.ip=
xxl.job.executor.port=9999
xxl.job.executor.logpath=./logs/xxl-job
xxl.job.executor.logretentiondays=30

### JWT
jwt.token.secret=roncooEducation123456

### Seata 分布式事务：本地禁用（无 Seata 服务器；@GlobalTransactional 退化为无操作）
seata.enabled=false
